# ============================================================================
# Reward Calculation Configuration
# ============================================================================

[reward]
# LLM model for judge evaluations
judge_model = "openai/gpt-5-mini"
api_key = "YOUR_OPENAI_API_KEY"

# Enable caching of LLM responses to reduce redundant calls
use_cache = true
cache_dir = ".reward_cache"

# Batch processing settings
batch_size = 10
max_concurrent_calls = 5

[reward.weights]
# Component weights (must sum to 1.0)
recall = 1.0              # Coverage of human review points
format = 1.0              # Format compliance
actionable = 1.0         # Actionability of feedback
grounded = 1.0           # Evidence grounding
score_difference = 1.0    # Alignment with human ratings

[reward.thresholds]
# Minimum thresholds for filtering
min_sft_reward = 0.6       # Minimum total reward to save SFT trajectory
min_format_score = 0.8     # Minimum format compliance score